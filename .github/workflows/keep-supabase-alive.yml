name: Keep Supabase Alive

# Pings the Dreamholic Supabase project every few days so it never
# sits idle for a full 7 days (which is when Supabase auto-pauses
# free-tier projects). Running twice a week is a safe margin even if
# one run happens to fail.

on:
  schedule:
    - cron: '0 6 * * 1,4'   # 06:00 UTC every Monday and Thursday
  workflow_dispatch:         # lets you also trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://llucoscjisstcmcwivjf.supabase.co/rest/v1/categories?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsdWNvc2NqaXNzdGNtY3dpdmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NDM5NTIsImV4cCI6MjA5OTQxOTk1Mn0.qH-czncHpyX-lwE1DuC1Xit_icaJC9qQsOJyfna51ho")
          echo "Supabase responded with HTTP $response"
          if [ "$response" -ge 400 ]; then
            echo "Ping failed — check the project isn't already paused or the anon key hasn't changed."
            exit 1
          fi
